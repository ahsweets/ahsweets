<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>AH Sweets Management</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e1e1e">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root { --primary: #059669; --success: #FFC107; --bg: #1e1e1e; --card: #2c2c2c; --text-dark: #e5e7eb; --text-light: #9ca3af; --border: #374151; --receive-red: #ef4444; --amber: #f59e0b; }
body { background-color: var(--bg); margin: 0; padding: 0; display: flex; justify-content: center; -webkit-user-select: none; user-select: none; }
#management-app { display: block; font-family: 'Inter', sans-serif; color: var(--text-dark); max-width: 600px; width: 100%; margin: 10px; padding: 15px; padding-right: 40px; border-radius: 16px; box-sizing: border-box; }
.header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.header-title { font-weight: 700; font-size: 1.1rem; color: var(--success); }
#syncStatusLine { display: block; font-size: 0.75rem; font-weight: 600; margin-bottom: 10px; color: #9ca3af; transition: color 0.3s ease; }
.search-container { position: sticky; top: 0; z-index: 1001; background: var(--bg); padding: 5px 0 10px 0; }
#customerSearch { width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 10px; background: #2c2c2c; color: white; font-size: 1rem; box-sizing: border-box; -webkit-user-select: text; user-select: text; }
.search-results { background: #333; border-radius: 0 0 10px 10px; max-height: 250px; overflow-y: auto; display: none; border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
.search-results div { padding: 12px; border-bottom: 1px solid var(--border); cursor: pointer; color: var(--success); }
.alpha-nav { position: fixed; right: 2px; top: 50%; transform: translateY(-50%); flex-direction: column; z-index: 1000; background: rgba(30, 30, 30, 0.85); padding: 5px 0; border-radius: 10px; max-height: 90vh; overflow-y: auto; display: flex; }
.alpha-nav a { font-size: 11px; color: var(--success); padding: 1px 6px; text-decoration: none; text-align: center; font-weight: 700; display: block; line-height: 1.4; }
.letter-header { color: var(--success); font-size: 1.2rem; font-weight: 800; padding: 10px 0 5px 0; border-bottom: 1px solid var(--border); margin-top: 15px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
.total-credit-grey { color: #888; font-size: 1rem; font-weight: 500; margin-left: 8px; cursor: pointer; }
.customer-box { background: var(--card); padding: 18px; border-radius: 12px; margin-bottom: 12px; border: 1px solid var(--border); position: relative; }
.customer-name { font-weight: 700; font-size: 1.1rem; color: var(--text-dark); cursor: pointer; padding-right: 80px; }
.total-amount { font-weight: 800; font-size: 1.3rem; color: var(--success); margin: 5px 0; display: block; cursor: pointer; }
.last-update-tag { position: absolute; top: 12px; right: 12px; font-size: 0.65rem; color: var(--text-light); background: rgba(255,255,255,0.08); padding: 3px 7px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer;}
.input-box { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; margin: 10px 0; font-size: 1rem; box-sizing: border-box; background: #2c2c2c; color: var(--text-dark); -webkit-user-select: text; user-select: text; }
.button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.btn { padding: 10px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 0.9rem; }
.btn-add { background: var(--primary); color: white; }
.btn-receive { background: var(--receive-red); color: white; }
.btn-backup { background: #374151; color: white; }
.add-new-section { margin-top: 30px; padding: 20px; background: #2c2c2c; border-radius: 12px; border: 2px dashed #4b5563; }
.bottom-spacer { height: 280px; }
#historyOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; display: none; justify-content: center; align-items: center; }
.history-modal { background: #2c2c2c; width: 90%; max-width: 400px; border-radius: 20px; border: 1px solid var(--border); overflow: hidden; }
.history-header { padding: 18px; background: #1e1e1e; font-weight: 800; color: var(--success); text-align: center; border-bottom: 1px solid var(--border); }
#histContent { max-height: 350px; overflow-y: auto; }
.history-item { padding: 10px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
.history-close { padding: 15px; text-align: center; background: var(--primary); color: white; cursor: pointer; font-weight: 700; }
.show-all-btn { width: 100%; margin: 10px 0; padding: 12px; background: #374151; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; text-align: center; }

/* New Features CSS */
.mini-popup { position: fixed; top: 15px; right: 15px; background: #ffffff; color: #1e1e1e; padding: 6px 10px; border-radius: 6px; display: flex; align-items: center; gap: 6px; font-size: 0.75rem; font-weight: 700; box-shadow: 0 4px 10px rgba(0,0,0,0.4); z-index: 10000; animation: popupSlideIn 0.3s ease-out; transition: opacity 0.4s ease; }
@keyframes popupSlideIn { from { transform: translateX(50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
.popup-icon { width: 14px; height: 14px; flex-shrink: 0; }
.popup-success { color: #059669; }
.popup-error { color: #ef4444; }
.shortcut-container { display: flex; justify-content: space-between; gap: 4px; margin-bottom: 15px; background: #2c2c2c; padding: 8px; border-radius: 10px; border: 1px solid var(--border); box-sizing: border-box; height: 50px; }
.shortcut-box { flex: 1; height: 100%; border: 1px dashed #4b5563; border-radius: 6px; display: flex; justify-content: center; align-items: center; cursor: pointer; color: var(--text-light); font-size: 7px; font-weight: 700; text-align: center; line-height: 1.1; overflow: hidden; }
.shortcut-box.filled { border: 1px solid var(--primary); color: var(--success); background: rgba(5, 150, 105, 0.05); }

/* Signal & Top Button CSS */
.signal-indicator { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); width: 10px; height: 10px; border-radius: 50%; display: inline-block; box-shadow: 0 0 5px rgba(0,0,0,0.5); transition: background-color 0.3s ease; }
.signal-green { background-color: #059669; box-shadow: 0 0 8px #059669; }
.signal-yellow { background-color: #f59e0b; box-shadow: 0 0 8px #f59e0b; }
.signal-red { background-color: #ef4444; box-shadow: 0 0 8px #ef4444; }
.scroll-to-top { position: fixed; bottom: 30px; right: 20px; left: auto; background: var(--primary); color: white; width: 45px; height: 45px; border-radius: 50%; display: none; justify-content: center; align-items: center; font-size: 20px; font-weight: bold; cursor: pointer; z-index: 10000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); text-decoration: none; }
</style>
</head>
<body oncontextmenu="return false;">
<div id="historyOverlay" onclick="closeHistory()">
    <div class="history-modal" onclick="event.stopPropagation()">
        <div id="histHeader" class="history-header">Recent History</div>
        <div id="histContent"></div>
        <div class="history-close" onclick="closeHistory()">CLOSE</div>
    </div>
</div>
<div id="management-app">
    <div class="header-row" id="mainHeader"><div class="header-title">AH Sweets ~ Ali Haider</div></div>
    <div id="syncStatusLine">Last Sync: Never</div>
    <div class="search-container">
        <div style="position: relative;">
            <div id="smsTimer" style="position:absolute; right:2px; top:-16px; font-weight:bold; color:var(--amber); font-size:0.75rem; display:none; z-index: 1002;"></div>
            <input type="text" id="customerSearch" oninput="searchCustomer()" placeholder="🔍 Search Customers..." autocomplete="off">
            <div id="liveSignal" class="signal-indicator signal-red"></div>
        </div>
        <div id="searchResults" class="search-results"></div>
    </div>
    <div id="alpha-nav" class="alpha-nav"></div>
    <div class="btn-container" id="topButtons" style="display: flex; gap: 10px; margin-bottom: 20px;">
        <button class="btn btn-backup" id="backupBtn" style="flex:1" onclick="handleBackup()" onmousedown="startBackupHold()" onmouseup="clearBackupHold()" onmouseleave="clearBackupHold()" ontouchstart="startBackupHold()" ontouchend="clearBackupHold()">⌛ Backup</button>
        <button class="btn btn-backup" style="flex:1" onclick="handleRestore()">⏳ Restore</button>
        <input type="file" id="fileInput" style="display:none" onchange="restoreFromFile(event)">
    </div>
    
    <div id="shortcut-container" class="shortcut-container"></div>
    
    <div id="customer-list"></div>
    
    <button class="show-all-btn" style="width:100%; display:none; margin-top:15px; margin-bottom: 20px;" id="showAllBtnTop" onclick="clearSearch()">Show All Customers</button>

    <div id="add-new-section" class="add-new-section">
        <h3 style="margin-top:0; font-size:1rem; color:var(--text-dark)">+ Add New Customer</h3>
        <input id="newCustomerName" type="text" placeholder="Customer Name" class="input-box">
        <div style="position: relative;">
            <input id="newCustomerPhone" type="text" placeholder="Phone Number (or n)" class="input-box">
            <div onclick="pickContact()" style="position: absolute; right: 12px; top: 18px; cursor: pointer; font-size: 1.4rem;" title="Pick from Contacts">👥</div>
        </div>
        <button class="btn btn-add" style="width:100%" onclick="addNewCustomer()">Create Account</button>
    </div>
    <div class="bottom-spacer"></div>
</div>

<div id="customModalOverlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:10005; display:none; justify-content:center; align-items:center;">
    <div style="background:#2c2c2c; width:90%; max-width:350px; border-radius:16px; border:1px solid var(--border); overflow:hidden; display:flex; flex-direction:column; font-family:'Inter',sans-serif; box-shadow:0 4px 20px rgba(0,0,0,0.5);">
        <div id="customModalMessage" style="padding:20px; color:var(--text-dark); font-weight:600; text-align:center; font-size:1rem; border-bottom:1px solid rgba(255,255,255,0.05); white-space:pre-wrap;"></div>
        <div id="customModalInputContainer" style="padding:15px; display:none; border-bottom:1px solid rgba(255,255,255,0.05);">
            <input type="text" id="customModalInput" class="input-box" style="margin:0; width:100%; box-sizing:border-box;">
        </div>
        <div id="customModalChoices" style="display:none; flex-direction:column; max-height:250px; overflow-y:auto;"></div>
        <div id="customModalButtons" style="display:flex; justify-content: space-evenly; padding: 15px 0; background: transparent;">
            <button id="customModalCancel" style="background:transparent; color:white; border:none; font-weight:700; cursor:pointer; padding: 10px 20px; font-size: 1rem;">Cancel</button>
            <button id="customModalOk" style="background:transparent; color:var(--amber); border:none; font-weight:700; cursor:pointer; padding: 10px 20px; font-size: 1rem;">OK</button>
        </div>
    </div>
</div>

<div id="editCustomerOverlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:10006; display:none; justify-content:center; align-items:center;">
    <div style="background:#2c2c2c; width:90%; max-width:350px; border-radius:16px; border:1px solid var(--border); padding:20px; box-sizing:border-box;">
        <h3 style="color:var(--success); margin-top:0; margin-bottom: 20px; text-align:center; font-family:'Inter',sans-serif;">Edit Customer</h3>
        <div style="display:flex; align-items:center; margin-bottom:15px; position:relative; background:#1e1e1e; border:1px solid var(--border); border-radius:8px;">
            <input type="text" id="editCustName" class="input-box" style="margin:0; flex:1; border:none; background:transparent;" placeholder="Name">
            <div onclick="copyEditInput('editCustName')" style="cursor:pointer; padding:10px; color:var(--text-light); display:flex; align-items:center;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            </div>
        </div>
        <div style="display:flex; align-items:center; margin-bottom:25px; position:relative; background:#1e1e1e; border:1px solid var(--border); border-radius:8px;">
            <input type="text" id="editCustPhone" class="input-box" style="margin:0; flex:1; border:none; background:transparent;" placeholder="Phone">
            <div onclick="copyEditInput('editCustPhone')" style="cursor:pointer; padding:10px; color:var(--text-light); display:flex; align-items:center;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            </div>
        </div>
        <div style="display:flex; justify-content:space-evenly;">
            <button onclick="closeEditModal()" style="background:transparent; color:white; border:none; font-weight:700; cursor:pointer; padding:10px 20px; font-size:1rem;">Cancel</button>
            <button id="saveEditBtn" style="background:transparent; color:var(--amber); border:none; font-weight:700; cursor:pointer; padding:10px 20px; font-size:1rem;">Save</button>
        </div>
    </div>
</div>

<div id="scrollTopBtn" class="scroll-to-top" onclick="window.scrollTo(0,0)">↑</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, update, get, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

let db = null;
async function getAppDb() {
    if (db) return db;
    let fbKey = localStorage.getItem('fb_key');
    let secret = localStorage.getItem('secret_key');
    let pId = localStorage.getItem('p_id');
    let dbUrl = localStorage.getItem('db_url');

    if (!fbKey || !secret || !pId || !dbUrl) {
        let pasted = await window.customPrompt("Paste your Cloud Structure here", "");
        if (pasted && pasted.includes('+')) {
            let parts = pasted.split('+');
            localStorage.setItem('fb_key', parts[0].trim());
            localStorage.setItem('drive_url', parts[1].trim());
            localStorage.setItem('secret_key', parts[2].trim());
            localStorage.setItem('p_id', parts[3].trim());
            localStorage.setItem('db_url', parts[4].trim());
            if (parts[5]) localStorage.setItem('apps_script_url', parts[5].trim());
            location.reload();
        }
        return null;
    }
    const fbConfig = { apiKey: fbKey, authDomain: pId + ".firebaseapp.com", databaseURL: dbUrl, projectId: pId };
    const app = initializeApp(fbConfig);
    db = getDatabase(app);
    return db;
}
function getStatusPattern() {
    const now = new Date();
    const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    let hr = now.getHours(); const ampm = hr >= 12 ? 'PM' : 'AM'; hr = hr % 12 || 12;
    return `${now.getDate()} ${months[now.getMonth()]} ${hr}:${now.getMinutes().toString().padStart(2,'0')} ${ampm}`;
}

window.showMiniPopup = function(message, type) {
    const popup = document.createElement('div');
    popup.className = 'mini-popup';
    const iconHTML = type === 'success' 
        ? `<svg class="popup-icon popup-success" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>` 
        : `<svg class="popup-icon popup-error" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>`;
    popup.innerHTML = `${iconHTML}<span>${message}</span>`;
    document.body.appendChild(popup);
    setTimeout(() => { popup.style.opacity = '0'; setTimeout(() => popup.remove(), 400); }, 4500);
};

window.sendFullToDrive = async function() {
    const driveUrl = localStorage.getItem('drive_url');
    if (!driveUrl || window.customers.length <= 15 || !navigator.onLine) return;
    const txt = window.customers.map(c => `${c.name} =${c.total}`).join('\n');
    try {
        const response = await fetch(driveUrl, { method: 'POST', body: JSON.stringify({ filename: "AH.Sweets.Backup.txt", data: txt }) });
        if (response.ok) window.showMiniPopup("Success", "success");
    } catch(e) {}
};

window.triggerAppsScriptBackup = async function() {
    const scriptUrl = localStorage.getItem('apps_script_url');
    if (!scriptUrl || !navigator.onLine) return;
    try { fetch(scriptUrl, { mode: 'no-cors' }); } catch(e) {}
};

window.syncIndividual = async function(cust) {
    if (localStorage.getItem('sync_blocked') === 'true') { window.checkSyncIntegrity(); return; }
    if (window.currentSignal === 'red' || !navigator.onLine || window.customers.length <= 15) { 
        if (window.customers.length > 15 && (!navigator.onLine || window.currentSignal === 'red')) { localStorage.setItem('sync_blocked', 'true'); }
        window.checkSyncIntegrity(); 
        return; 
    }
    const database = await getAppDb();
    const secret = localStorage.getItem('secret_key');
    if (!database || !secret) return;
    const reqTime = Date.now();
    const indvTimer = setTimeout(() => { 
        setTimeout(() => {
            const lastSync = parseInt(localStorage.getItem('lastSyncTimestamp')) || 0;
            if (reqTime > lastSync) { localStorage.setItem('sync_blocked', 'true'); window.checkSyncIntegrity(); } 
        }, 500);
    }, 4000);
    try {
        refreshSyncLine("Syncing....", false, true);
        const statusTime = getStatusPattern();
        const mCust = { C: cust.name, P: cust.phone, T: cust.total, I: cust.id, H: cust.history || [], L: cust.lastTime || "" };
        const syncPromise = set(ref(database, `app_data/${secret}/customers/${cust.id}`), mCust);
        const timeoutPromise = new Promise((_, reject) => setTimeout(() => reject(new Error("Timeout")), 4000));
        await Promise.race([syncPromise, timeoutPromise]);
        clearTimeout(indvTimer);
        if (Date.now() - reqTime > 4000 || localStorage.getItem('sync_blocked') === 'true') { 
            localStorage.setItem('sync_blocked', 'true');
            window.checkSyncIntegrity();
            return; 
        }
        await set(ref(database, `app_data/${secret}/lastSyncTime`), statusTime);
        localStorage.setItem('storedSyncTime', statusTime);
        localStorage.setItem('lastSyncTimestamp', Date.now()); 
        refreshSyncLine(statusTime, true);
        window.sendFullToDrive();
        window.triggerAppsScriptBackup();
    } catch(e) { refreshSyncLine(`Error: ${e.message}`, false, false, true); }
};

window.syncDelete = async function(id) {
    if (localStorage.getItem('sync_blocked') === 'true') { window.checkSyncIntegrity(); return; }
    if (window.currentSignal === 'red' || !navigator.onLine || window.customers.length <= 15) { 
        if (window.customers.length > 15 && (!navigator.onLine || window.currentSignal === 'red')) { localStorage.setItem('sync_blocked', 'true'); }
        window.checkSyncIntegrity(); 
        return; 
    }
    const database = await getAppDb();
    const secret = localStorage.getItem('secret_key');
    if (!database || !secret) return;
    const reqTime = Date.now();
    const delTimer = setTimeout(() => { 
        setTimeout(() => {
            const lastSync = parseInt(localStorage.getItem('lastSyncTimestamp')) || 0;
            if (reqTime > lastSync) { localStorage.setItem('sync_blocked', 'true'); window.checkSyncIntegrity(); } 
        }, 500);
    }, 4000);
    try {
        refreshSyncLine("Syncing....", false, true);
        const statusTime = getStatusPattern();
        const syncPromise = remove(ref(database, `app_data/${secret}/customers/${id}`));
        const timeoutPromise = new Promise((_, reject) => setTimeout(() => reject(new Error("Timeout")), 4000));
        await Promise.race([syncPromise, timeoutPromise]);
        clearTimeout(delTimer);
        if (Date.now() - reqTime > 4000 || localStorage.getItem('sync_blocked') === 'true') { 
            localStorage.setItem('sync_blocked', 'true');
            window.checkSyncIntegrity();
            return; 
        }
        await set(ref(database, `app_data/${secret}/lastSyncTime`), statusTime);
        localStorage.setItem('storedSyncTime', statusTime);
        localStorage.setItem('lastSyncTimestamp', Date.now()); 
        refreshSyncLine(statusTime, true);
        window.sendFullToDrive();
        window.triggerAppsScriptBackup();
    } catch(e) { refreshSyncLine(`Error: ${e.message}`, false, false, true); }
};

window.fullManualBackup = async function() {
    if (window.currentSignal === 'red' || !navigator.onLine) { refreshSyncLine("You are offline", false, true); return; }
    if (window.customers.length <= 15) { refreshSyncLine("Try again later", false, true); return; }
    const statusTime = getStatusPattern();
    const database = await getAppDb();
    const secret = localStorage.getItem('secret_key');
    if (!database || !secret) { return; }
    const reqTime = Date.now();
    const backupTimer = setTimeout(() => { 
        if (parseInt(localStorage.getItem('lastEditTimestamp')) > parseInt(localStorage.getItem('lastSyncTimestamp'))) { 
            localStorage.setItem('sync_blocked', 'true'); window.checkSyncIntegrity(); 
        } 
    }, 10000);
    try {
        refreshSyncLine("Syncing....", false, true);
        const custObj = {};
        window.customers.forEach(c => { if(c) custObj[c.id] = { C: c.name, P: c.phone, T: c.total, I: c.id, H: c.history || [], L: c.lastTime || "" }; });
        const msg = `All data sent to cloud at ${statusTime}`;
        
        const syncPromise = set(ref(database, `app_data/${secret}/customers`), custObj);
        const timeoutPromise = new Promise((_, reject) => setTimeout(() => reject(new Error("Timeout")), 10000));
        await Promise.race([syncPromise, timeoutPromise]);
        
        clearTimeout(backupTimer);
        if (Date.now() - reqTime > 10000) { 
            localStorage.setItem('sync_blocked', 'true');
            window.checkSyncIntegrity();
            return; 
        }
        await set(ref(database, `app_data/${secret}/lastSyncTime`), msg);
        window.sendFullToDrive(); 
        window.triggerAppsScriptBackup();
        localStorage.setItem('sync_blocked', 'false');
        localStorage.setItem('storedSyncTime', msg);
        localStorage.setItem('lastSyncTimestamp', Date.now()); 
        refreshSyncLine(msg, true);
    } catch (e) { refreshSyncLine(`Error: ${e.message}`, false, false, true); }
};

window.pullFromCloud = async function() {
    if (!navigator.onLine) return;
    const database = await getAppDb();
    const secret = localStorage.getItem('secret_key');
    if (!database || !secret) return;
    try {
        refreshSyncLine("Syncing....", false, true);
        const snapshot = await get(ref(database, `app_data/${secret}`));
        const cloudData = snapshot.val();
        if (cloudData && cloudData.customers) {
            const rawList = Object.values(cloudData.customers);
            window.customers = rawList.map(it => ({ id: it.I || Date.now(), name: it.C, phone: it.P || "n", total: it.T, history: it.H || [], lastTime: it.L || "" }));
            const cloudSyncTime = cloudData.lastSyncTime || getStatusPattern();
            localStorage.setItem('customers', JSON.stringify(window.customers));
            localStorage.setItem('storedSyncTime', cloudSyncTime);
            localStorage.setItem('lastSyncTimestamp', Date.now());
            localStorage.setItem('sync_blocked', 'false');
            updateUI();
            if(window.checkSyncIntegrity) window.checkSyncIntegrity(); 
            refreshSyncLine(cloudSyncTime, true);
        }
    } catch(e) { refreshSyncLine(`Error: ${e.message}`, false, false, true); }
};
</script>

<script>
window.showCustomModal = function(options) {
    return new Promise(resolve => {
        const overlay = document.getElementById('customModalOverlay');
        const msgEl = document.getElementById('customModalMessage');
        const inpCont = document.getElementById('customModalInputContainer');
        const inpEl = document.getElementById('customModalInput');
        const choicesEl = document.getElementById('customModalChoices');
        const btnCont = document.getElementById('customModalButtons');
        const btnCancel = document.getElementById('customModalCancel');
        const btnOk = document.getElementById('customModalOk');

        msgEl.innerText = options.message || '';
        inpCont.style.display = options.type === 'prompt' ? 'block' : 'none';
        choicesEl.style.display = options.type === 'choice' ? 'flex' : 'none';
        
        btnOk.style.display = options.type === 'choice' ? 'none' : 'block';
        btnCancel.style.display = options.type === 'alert' ? 'none' : 'block';
        
        if (options.type === 'prompt') {
            inpEl.value = options.defaultText || '';
            setTimeout(() => inpEl.focus(), 100);
        }

        if (options.type === 'choice') {
            choicesEl.innerHTML = '';
            options.choices.forEach(c => {
                let div = document.createElement('div');
                div.style.cssText = "padding:15px; text-align:center; border-bottom:1px solid rgba(255,255,255,0.05); color:var(--success); font-weight:600; cursor:pointer;";
                div.innerText = c.label;
                div.onclick = () => { close(); resolve(c.value); };
                choicesEl.appendChild(div);
            });
        }

        btnOk.onclick = () => {
            close();
            if (options.type === 'prompt') resolve(inpEl.value);
            else resolve(true);
        };
        
        btnCancel.onclick = () => {
            close();
            if (options.type === 'prompt') resolve(null);
            else resolve(false);
        };

        const close = () => {
            overlay.style.display = 'none';
            btnOk.onclick = null;
            btnCancel.onclick = null;
        };

        overlay.style.display = 'flex';
    });
};

window.customAlert = (msg) => window.showCustomModal({type: 'alert', message: msg});
window.customConfirm = (msg) => window.showCustomModal({type: 'confirm', message: msg});
window.customPrompt = (msg, def) => window.showCustomModal({type: 'prompt', message: msg, defaultText: def});

window.handleAmountInput = function(e, el) {
    let val = el.value;
    if (val.includes('.')) {
        el.setAttribute('inputmode', 'text');
        let parts = val.split('.');
        if (parts.length > 2) {
            val = parts[0] + '.' + parts.slice(1).join('').replace(/\./g, '');
            el.value = val;
        }
        if (e && e.data === '.') {
            el.value = val + ' ';
        }
    } else {
        el.setAttribute('inputmode', 'decimal');
    }
};

window.currentSignal = 'red';
window.startLiveSignal = function() {
    const doCheck = () => {
        const dbUrl = localStorage.getItem('db_url');
        if (!dbUrl || !navigator.onLine) { updateSignal('red'); return; }
        const start = Date.now();
        fetch(dbUrl + '/.info/connected.json', { mode: 'no-cors', cache: 'no-store' })
        .then(() => {
            const lat = Date.now() - start;
            if (lat < 400) updateSignal('green');
            else if (lat < 2000) updateSignal('yellow');
            else updateSignal('red');
        }).catch(() => updateSignal('red'));
    };
    doCheck();
    setInterval(doCheck, 2000);
};
function updateSignal(color) {
    window.currentSignal = color;
    const el = document.getElementById('liveSignal');
    if(el) { el.className = 'signal-indicator signal-' + color; }
}

if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js'); }
window.customers = JSON.parse(localStorage.getItem('customers')) || [];
let syncTimeout = null;
let singleViewId = null;
let shortcutHoldTimer = null;
let backupHoldTimer = null;
function startBackupHold() { backupHoldTimer = setTimeout(() => { downloadBackupFile(); }, 1500); }
function clearBackupHold() { if (backupHoldTimer) clearTimeout(backupHoldTimer); }

const totalClickTracker = {};

function logSystemActivity(action, name) {
    let logs = JSON.parse(localStorage.getItem('system_activities')) || [];
    const timeLabel = getFormattedTime().split('|')[0];
    logs.unshift(`${action.charAt(0).toUpperCase() + action.slice(1)} ${name} at ${timeLabel}`);
    if (logs.length > 7) logs = logs.slice(0, 7);
    localStorage.setItem('system_activities', JSON.stringify(logs));
}

function getFormattedTime() {
    const now = new Date();
    const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    let hr = now.getHours(); const ampm = hr >= 12 ? 'pm' : 'am'; hr = hr % 12 || 12;
    return `${now.getDate()} ${months[now.getMonth()]} ${hr}:${now.getMinutes().toString().padStart(2, '0')} ${ampm}|${now.getTime()}`;
}
function formatAmount(n) { return Number(n).toLocaleString('en-IN'); }

function refreshSyncLine(msg, isSuccess = false, isAmber = false, isError = false) {
    const statusEl = document.getElementById('syncStatusLine');
    const time = localStorage.getItem('storedSyncTime') || "Never";
    if (syncTimeout) clearTimeout(syncTimeout);
    if (localStorage.getItem('sync_blocked') === 'true' && !isAmber && !isSuccess) {
        statusEl.innerHTML = "Sync Blocked: Use Backup Button"; 
        statusEl.style.color = "#ef4444";
        return; 
    }
    if (isError) { statusEl.innerHTML = msg; statusEl.style.color = "#ef4444"; } 
    else if (isAmber) { statusEl.innerHTML = msg || "Syncing...."; statusEl.style.color = "#f59e0b";
        syncTimeout = setTimeout(() => { if(statusEl.innerHTML && statusEl.innerHTML.includes("Syncing")) refreshSyncLine(time, false); }, 16000);
    } else if (isSuccess) { 
        statusEl.innerHTML = msg.length > 20 ? msg : `Last Sync at ${msg}`; 
        statusEl.style.color = "#059669"; 
    } else { 
        statusEl.innerHTML = time === "Never" ? "Last Sync: Never" : (time.length > 20 ? time : `Last Sync at ${time}`); 
        statusEl.style.color = "#9ca3af"; 
    }
}

window.checkSyncIntegrity = function() {
    const lastSyncTS = parseInt(localStorage.getItem('lastSyncTimestamp')) || 0;
    const lastEditTS = parseInt(localStorage.getItem('lastEditTimestamp')) || 0;
    if (lastEditTS > lastSyncTS && window.customers.length > 15) { localStorage.setItem('sync_blocked', 'true'); }
    if (localStorage.getItem('sync_blocked') === 'true') {
        const statusEl = document.getElementById('syncStatusLine');
        if (statusEl && !statusEl.innerHTML.includes("Syncing")) { statusEl.innerHTML = "Sync Blocked: Use Backup Button"; statusEl.style.color = "#ef4444"; }
    }
};

function saveLocalOnly() { localStorage.setItem('customers', JSON.stringify(window.customers)); localStorage.setItem('lastEditTimestamp', Date.now()); updateUI(); }

/* Shortcut Functions */
function handleHoldStart(index) {
    shortcutHoldTimer = setTimeout(async () => {
        let shortcuts = JSON.parse(localStorage.getItem('shortcuts')) || [null,null,null,null,null,null];
        if (shortcuts[index] && await window.customConfirm("Remove this shortcut?")) {
            shortcuts[index] = null;
            localStorage.setItem('shortcuts', JSON.stringify(shortcuts));
            renderShortcuts();
        }
    }, 3000);
}
function handleHoldEnd() { if (shortcutHoldTimer) clearTimeout(shortcutHoldTimer); }

function handleShortcutClick(index) {
    let shortcuts = JSON.parse(localStorage.getItem('shortcuts')) || [null,null,null,null,null,null];
    if (shortcuts[index]) {
        singleViewId = shortcuts[index];
        updateUI();
    } else {
        window.assigningShortcutIndex = index;
        const searchInput = document.getElementById('customerSearch');
        searchInput.focus();
        searchInput.placeholder = "🔍 Search to assign...";
    }
}

function renderShortcuts() {
    let shortcuts = JSON.parse(localStorage.getItem('shortcuts')) || [null,null,null,null,null,null];
    const container = document.getElementById('shortcut-container');
    if (!container) return;
    container.innerHTML = '';
    for(let i=0; i<6; i++) {
        let c = window.customers.find(x => x && x.id === shortcuts[i]);
        const box = document.createElement('div');
        box.className = c ? "shortcut-box filled" : "shortcut-box";
        box.onmousedown = box.ontouchstart = () => handleHoldStart(i);
        box.onmouseup = box.onmouseleave = box.ontouchend = () => handleHoldEnd();
        box.onclick = () => handleShortcutClick(i);
        if (c) {
            let names = c.name.trim().split(/\s+/);
            box.innerHTML = names.length > 1 ? `${names[0]}<br>${names[1]}` : names[0];
        } else { box.innerHTML = '+'; }
        container.appendChild(box);
    }
}

function updateBill(id, action) {
    const input = document.getElementById(`input-${id}`);
    const inputVal = input.value.trim();
    const dotIndex = inputVal.indexOf('.');
    let amt = 0;
    let productStr = "";
    if (dotIndex !== -1) {
        amt = parseFloat(inputVal.substring(0, dotIndex));
        productStr = inputVal.substring(dotIndex);
    } else {
        amt = parseFloat(inputVal);
    }
    if (!amt || amt <= 0) return;
    const c = window.customers.find(x => x && x.id === id);
    c.total += action === 'add' ? amt : -amt;
    const t = getFormattedTime();
    c.lastTime = t;
    logSystemActivity('update', c.name);
    const timeLabel = t.split('|')[0];
    if(!c.history) c.history = [];
    c.history.unshift({ a: (action === 'add' ? '+' : '-') + amt + productStr, t: c.total, d: timeLabel });
    
    const isW = c.phone && c.phone.toLowerCase().includes('w');
    if(c.history.length > 10) { c.history = c.history.slice(0, 10); }
    
    saveLocalOnly(); 
    if (window.syncIndividual) window.syncIndividual(c);

    if (c.phone && c.phone !== 'n') {
        let cleanPhone = c.phone.toLowerCase().replace(/w/g, '').replace(/\s/g, "");
        if (cleanPhone.startsWith('0')) cleanPhone = '+92' + cleanPhone.slice(1);
        
        let msg = action === 'add' ? `Dear Customer,\nRs. ${formatAmount(amt)} has been added to your account at AH Sweets.\nYour updated bill is Rs. ${formatAmount(c.total)}` : `Dear Customer,\nRs. ${formatAmount(amt)} has been received from your account at AH Sweets.\nYour updated bill is Rs. ${formatAmount(c.total)}`;
        
        if (isW) {
            const tempInput = document.createElement("textarea");
            tempInput.value = msg;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand("copy");
            document.body.removeChild(tempInput);
        }

        const executeAction = (isSuccess) => {
            if (isW) {
                if (isSuccess && window.currentSignal !== 'red') {
                    const waNumber = cleanPhone.replace(/\+/g, '');
                    window.location.href = `https://wa.me/${waNumber}?text=${encodeURIComponent(msg)}`;
                }
            } else {
                window.location.href = `sms:${cleanPhone}?body=${encodeURIComponent(msg)}`;
            }
        };

        if (localStorage.getItem('sync_blocked') === 'true' || !navigator.onLine || window.currentSignal === 'red') {
            executeAction(false);
        } else {
            let timerDiv = document.getElementById('smsTimer');
            timerDiv.style.display = 'block';
            let timeLeft = 5;
            timerDiv.innerText = `Sync: ${timeLeft}s`;
            let initSyncTime = localStorage.getItem('lastSyncTimestamp');
            
            let checkInterval = setInterval(() => {
                timeLeft--;
                timerDiv.innerText = `Sync: ${timeLeft}s`;
                let newSyncTime = localStorage.getItem('lastSyncTimestamp');
                
                if(newSyncTime !== initSyncTime || timeLeft <= 0) {
                    clearInterval(checkInterval);
                    timerDiv.style.display = 'none';
                    executeAction(newSyncTime !== initSyncTime);
                }
            }, 1000);
        }
    }
    input.value = '';
}

window.nonActiveMode = false;
window.nonActiveList = [];
window.nonActiveIndex = 0;

window.startNonActiveFlow = function() {
    const now = Date.now();
    const sevenDays = 7 * 24 * 60 * 60 * 1000;
    window.nonActiveList = window.customers.filter(c => {
        if (!c) return false;
        if (!c.lastTime) return true;
        const parts = c.lastTime.split('|');
        if (parts.length > 1) {
            const ts = parseInt(parts[1]);
            return (now - ts) > sevenDays;
        }
        return true;
    });
    if (window.nonActiveList.length === 0) {
        window.showMiniPopup("No non-active customers found", "success");
        return;
    }
    window.showMiniPopup(window.nonActiveList.length + " found", "success");
    window.nonActiveIndex = 0;
    window.nonActiveMode = true;
    window.showCurrentNonActive();
};

window.showCurrentNonActive = function() {
    const c = window.nonActiveList[window.nonActiveIndex];
    singleViewId = c.id;
    updateUI();
};

window.nextNonActive = function() {
    if (window.nonActiveIndex < window.nonActiveList.length - 1) {
        window.nonActiveIndex++;
        window.showCurrentNonActive();
    } else {
        window.nonActiveMode = false;
        singleViewId = null;
        clearSearch();
        window.scrollTo(0,0);
    }
};

window.prevNonActive = function() {
    if (window.nonActiveIndex > 0) {
        window.nonActiveIndex--;
        window.showCurrentNonActive();
    }
};

function updateUI() {
    if (!window.customers) return;
    const list = document.getElementById('customer-list');
    const alphaNav = document.getElementById('alpha-nav');
    const showAllBtn = document.getElementById('showAllBtnTop');
    const searchInput = document.getElementById('customerSearch');
    const totalMoney = window.customers.reduce((sum, c) => sum + (c ? (c.total || 0) : 0), 0);
    searchInput.placeholder = `🔍 Search ${window.customers.length} Customers...`;
    list.innerHTML = '';
    renderShortcuts();
    window.customers.sort((a, b) => (a && b) ? a.name.toLowerCase().localeCompare(b.name.toLowerCase()) : 0);
    
    if (singleViewId) { alphaNav.style.display = 'none'; showAllBtn.style.display = 'block'; }
    else {
        alphaNav.style.display = 'flex'; showAllBtn.style.display = 'none';
        const activeLetters = [...new Set(window.customers.filter(c=>c).map(c => {
            let char = c.name.trim().charAt(0).toUpperCase();
            return /[A-Z]/.test(char) ? char : '#';
        }))].sort();
        alphaNav.innerHTML = `<a href="#add-new-section" style="font-size: 18px; margin-bottom: 5px;">+</a>`;
        activeLetters.forEach(char => { alphaNav.innerHTML += `<a href="#letter-${char === '#' ? 'HASH' : char}">${char}</a>`; });
    }

    let lastLetter = '';
    let currentHTML = '';
    window.customers.forEach((c) => {
        if (!c || (singleViewId !== null && c.id !== singleViewId)) return;
        let char = c.name.trim().charAt(0).toUpperCase();
        if (!/[A-Z]/.test(char)) char = '#';
        if (char !== lastLetter && singleViewId === null) {
            currentHTML += `<div id="letter-${char === '#' ? 'HASH' : char}" class="letter-header"><div><span>${char}</span>${lastLetter === '' ? `<span class="total-credit-grey" onclick="showCalculatedLastUpdate()">~ ${formatAmount(Math.round(totalMoney))}</span><svg onclick="startNonActiveFlow()" title="Non-Active Customers" style="margin-left: 10px; cursor:pointer; vertical-align:middle; width:20px; height:20px; color:#9ca3af; transition: color 0.2s;" onmouseover="this.style.color='var(--amber)'" onmouseout="this.style.color='#9ca3af'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>` : ''}</div></div>`;
            lastLetter = char;
        }
        let displayTime = "";
        if (c.lastTime && typeof c.lastTime === 'string' && c.lastTime.includes('|')) {
            const parts = c.lastTime.split('|');
            displayTime = (Date.now() - parseInt(parts[1]) > 86400000) ? parts[0].split(' ')[0] + ' ' + parts[0].split(' ')[1] : parts[0].split(' ')[2] + ' ' + parts[0].split(' ')[3];
        }
        currentHTML += `<div class="customer-box"><div class="customer-name" ondblclick="editCustomer(${c.id})">${c.name}</div><div class="total-amount" onclick="deleteTracker(${c.id})">Rs. ${formatAmount(Math.round(c.total))}</div><input type="text" inputmode="decimal" id="input-${c.id}" class="input-box" placeholder="Amount" oninput="handleAmountInput(event, this)"><div class="button-group"><button class="btn btn-add" onclick="updateBill(${c.id}, 'add')">Add</button><button class="btn btn-receive" onclick="updateBill(${c.id}, 'receive')">Receive</button></div>${displayTime ? `<div class="last-update-tag" onclick="showHistory(${c.id})">${displayTime}</div>` : ''}</div>`;
    });
    
    if (window.nonActiveMode && singleViewId !== null) {
        const isLast = window.nonActiveIndex >= window.nonActiveList.length - 1;
        const isFirst = window.nonActiveIndex === 0;
        currentHTML += `<div style="display:flex; justify-content:space-between; margin-top:20px; gap:10px;">
            <button onclick="prevNonActive()" style="flex:1; padding:12px; background:#3b82f6; color:white; border:none; border-radius:8px; font-weight:700; ${isFirst ? 'opacity:0.5; pointer-events:none;' : ''}">Back</button>
            <button onclick="nextNonActive()" style="flex:1; padding:12px; background:#3b82f6; color:white; border:none; border-radius:8px; font-weight:700;">${isLast ? 'Last' : 'Next'}</button>
        </div>`;
    }
    
    list.innerHTML = currentHTML;
}

function searchCustomer() {
    const qInput = document.getElementById('customerSearch');
    const q = qInput.value.toLowerCase().trim();
    const res = document.getElementById('searchResults');
    res.innerHTML = '';

    if (q.length < 1) { 
        res.style.display = 'none'; 
        if (window.assigningShortcutIndex !== undefined) window.assigningShortcutIndex = undefined;
        return; 
    }
    const filtered = window.customers.filter(c => c && c.name.toLowerCase().includes(q));
    if (filtered.length > 0) {
        res.style.display = 'block';
        filtered.forEach(c => {
            const row = document.createElement('div');
            row.textContent = c.name;
            row.onclick = () => { 
                if (window.assigningShortcutIndex !== undefined) {
                    let shortcuts = JSON.parse(localStorage.getItem('shortcuts')) || [null,null,null,null,null,null];
                    shortcuts[window.assigningShortcutIndex] = c.id;
                    localStorage.setItem('shortcuts', JSON.stringify(shortcuts));
                    window.assigningShortcutIndex = undefined;
                    res.style.display = 'none'; qInput.value = ''; updateUI(); 
                } else {
                    singleViewId = c.id; res.style.display = 'none'; qInput.value = ''; updateUI(); 
                }
            };
            res.appendChild(row);
        });
    } else {
        res.style.display = 'block';
        const createRow = document.createElement('div');
        createRow.textContent = `+ Create: ${qInput.value}`;
        createRow.style.color = 'var(--amber)';
        createRow.onclick = () => {
            document.getElementById('newCustomerName').value = qInput.value;
            window.location.hash = "add-new-section";
            res.style.display = 'none'; qInput.value = '';
        };
        res.appendChild(createRow);
    }
}

function clearSearch() { document.getElementById('customerSearch').value = ''; singleViewId = null; window.nonActiveMode = false; updateUI(); }

function addNewCustomer() {
    const n = document.getElementById('newCustomerName');
    const p = document.getElementById('newCustomerPhone');
    const nVal = n.value.trim().toLowerCase();
    const pVal = p.value.trim().toLowerCase();
    
    if (!nVal) return;

    const existing = window.customers.find(c => {
        if (!c) return false;
        const cName = c.name.trim().toLowerCase();
        const cPhone = c.phone.trim().toLowerCase();
        return cName === nVal || (pVal !== 'n' && pVal !== '' && cPhone === pVal);
    });

    if (existing) {
        singleViewId = existing.id;
        updateUI();
        document.getElementById('customerSearch').value = '';
        n.value = ''; p.value = '';
        window.location.hash = "";
        window.scrollTo(0,0);
        window.showMiniPopup("Account already exists", "error");
        return;
    }

    const newCust = { id: Date.now(), name: n.value.trim(), phone: p.value.trim() || "n", total: 0, history: [], lastTime: "" };
    window.customers.push(newCust);
    saveLocalOnly();
    n.value = ''; p.value = '';
    singleViewId = newCust.id;
    updateUI();
    document.getElementById('customerSearch').value = '';
}

window.pickContact = async function() {
    if ('contacts' in navigator && 'ContactsManager' in window) {
        try {
            const contacts = await navigator.contacts.select(['name', 'tel'], { multiple: false });
            if (contacts.length > 0) {
                if(contacts[0].name && contacts[0].name.length > 0) document.getElementById('newCustomerName').value = contacts[0].name[0];
                if(contacts[0].tel && contacts[0].tel.length > 0) {
                    let selectedTel = contacts[0].tel[0];
                    if (contacts[0].tel.length > 1) {
                        let choiceOpts = contacts[0].tel.map(t => ({label: t, value: t}));
                        let selected = await window.showCustomModal({type: 'choice', message: 'Select a number to use:', choices: choiceOpts});
                        if (selected) {
                            selectedTel = selected;
                        } else {
                            return;
                        }
                    }
                    let formattedTel = selectedTel.replace(/[^0-9+]/g, '');
                    if (formattedTel.startsWith('+92')) {
                        formattedTel = '0' + formattedTel.substring(3);
                    }
                    document.getElementById('newCustomerPhone').value = formattedTel;
                }
            }
        } catch (ex) { /* Do nothing if cancelled */ }
    } else {
        window.showMiniPopup("Contacts API not supported on this device/browser.", "error");
    }
};

async function deleteTracker(id) {
    const now = Date.now();
    if (!totalClickTracker[id]) { totalClickTracker[id] = { count: 1, time: now }; return; }
    if (now - totalClickTracker[id].time < 1500) totalClickTracker[id].count++; else totalClickTracker[id].count = 1;
    totalClickTracker[id].time = now;
    if (totalClickTracker[id].count >= 3) {
        totalClickTracker[id].count = 0;
        const c = window.customers.find(x => x && x.id === id);
        if (await window.customConfirm(`Delete ${c.name}?`)) { 
            logSystemActivity('delete', c.name);
            window.customers = window.customers.filter(x => x && x.id !== id); 
            saveLocalOnly(); 
            if (window.syncDelete) window.syncDelete(id);
        }
    }
}

function showHistory(id) {
    const c = window.customers.find(x => x && x.id === id);
    if (!c || !c.history) return;
    const header = document.getElementById('histHeader');
    header.innerText = c.name;
    let h = "";
    c.history.forEach(it => { 
        const strA = String(it.a);
        const isAdd = strA.startsWith('+');
        const rawVal = strA.slice(1);
        const dotIdx = rawVal.indexOf('.');
        let dispName = isAdd ? 'Add' : 'Receive';
        let dispAmount = rawVal;
        if (dotIdx !== -1) {
            dispAmount = rawVal.substring(0, dotIdx);
            let prod = rawVal.substring(dotIdx + 1).trim();
            if (prod) {
                dispName = prod.charAt(0).toUpperCase() + prod.slice(1);
            }
        }
        h += `<div class="history-item"><div style="font-weight:600; font-size:0.95rem; color:${isAdd?'#059669':'#ef4444'}">${dispName} :- ${formatAmount(dispAmount)}</div><div style="color:#e5e7eb; font-weight:600; font-size:0.95rem; margin: 2px 0;">Total Bill :- ${formatAmount(it.t)}</div><div style="font-weight:600; font-size:0.8rem; color:#9ca3af">${it.d}</div></div>`; 
    });
    document.getElementById('histContent').innerHTML = h || `<div style="padding:20px; text-align:center; color:#9ca3af">No History</div>`;
    document.getElementById('historyOverlay').style.display = 'flex';
}

function closeHistory() { document.getElementById('historyOverlay').style.display = 'none'; }

window.copyEditInput = function(id) {
    const val = document.getElementById(id).value;
    if (!val) return;
    const temp = document.createElement('textarea');
    temp.value = val;
    document.body.appendChild(temp);
    temp.select();
    temp.setSelectionRange(0, 99999);
    try {
        document.execCommand('copy');
        window.showMiniPopup("Copied!", "success");
    } catch (err) {
        window.showMiniPopup("Failed to copy", "error");
    }
    document.body.removeChild(temp);
};

window.editCustomer = function(id) {
    const c = window.customers.find(x => x && x.id === id);
    if (!c) return;
    document.getElementById('editCustName').value = c.name || '';
    document.getElementById('editCustPhone').value = c.phone === 'n' ? '' : c.phone;
    document.getElementById('editCustomerOverlay').style.display = 'flex';
    document.getElementById('saveEditBtn').onclick = () => {
        const n = document.getElementById('editCustName').value.trim();
        const p = document.getElementById('editCustPhone').value.trim();
        if (n && (c.name !== n || c.phone !== (p || 'n'))) {
            c.name = n;
            c.phone = p || "n";
            logSystemActivity('edit', c.name);
            saveLocalOnly();
            if (window.syncIndividual) window.syncIndividual(c);
        }
        closeEditModal();
    };
};

window.closeEditModal = function() {
    document.getElementById('editCustomerOverlay').style.display = 'none';
};

function handleBackup() { if (window.fullManualBackup) window.fullManualBackup(); }
async function handleRestore() {
    if (!navigator.onLine) { document.getElementById('fileInput').click(); } 
    else {
        const choice = await window.customConfirm("Restore from CLOUD?");
        if (choice) { if(window.pullFromCloud) window.pullFromCloud(); }
        else { document.getElementById('fileInput').click(); }
    }
}
function downloadBackupFile() {
    const now = new Date();
    let hr = now.getHours(); 
    const ampmCorrect = hr >= 12 ? 'pm' : 'am'; 
    hr = hr % 12 || 12;
    let mins = now.getMinutes().toString().padStart(2, '0');
    const monthName = now.toLocaleString('en-US', { month: 'long' }).toLowerCase();
    const fileName = `AH ${now.getDate()} ${monthName} ${hr}-${mins} ${ampmCorrect} .Json`;
    const backupObj = {};
    window.customers.forEach(c => { if(c) backupObj[c.id] = { C: c.name, P: c.phone, T: c.total, I: c.id, H: c.history || [], L: c.lastTime || "" }; });
    const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(backupObj));
    const link = document.createElement('a'); link.setAttribute('href', dataUri); link.setAttribute('download', fileName); link.click();
}
function restoreFromFile(e) {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
        try {
            const data = JSON.parse(ev.target.result);
            if (data && typeof data === 'object' && !Array.isArray(data)) {
                const rawList = Object.values(data);
                if (rawList.length > 0) {
                    window.customers = rawList.map(it => ({ id: it.I, name: it.C, phone: it.P, total: it.T, history: it.H || [], lastTime: it.L || "" }));
                    localStorage.setItem('customers', JSON.stringify(window.customers));
                    localStorage.setItem('lastSyncTimestamp', Date.now());
                    localStorage.setItem('sync_blocked', 'false');
                    updateUI();
                }
            }
        } catch (err) { window.customAlert("Invalid File Format"); }
    };
    reader.readAsText(file);
}

function showCalculatedLastUpdate() {
    const logs = JSON.parse(localStorage.getItem('system_activities')) || [];
    const header = document.getElementById('histHeader');
    header.innerText = "Last 7 Activities";
    let h = "";
    if (logs.length > 0) {
        logs.forEach((log, index) => {
            const color = index % 2 === 0 ? '#3b82f6' : 'var(--amber)';
            h += `<div class="history-item" style="color: ${color}; font-weight: 400; font-size: 0.8rem;">${logs.length - index}. ${log}</div>`;
        });
    } else {
        let latest = null;
        window.customers.forEach(c => {
            if (c && c.lastTime && typeof c.lastTime === 'string' && c.lastTime.includes('|')) {
                const parts = c.lastTime.split('|');
                const ts = parseInt(parts[1]);
                if (!latest || ts > latest.ts) { latest = { name: c.name, time: parts[0], ts: ts }; }
            }
        });
        if (latest) h = `<div class="history-item" style="color:#3b82f6">Latest: ${latest.name}<br>${latest.time}</div>`;
        else h = `<div style="padding:20px; text-align:center; color:#9ca3af">No updates recorded yet.</div>`;
    }
    document.getElementById('histContent').innerHTML = h;
    document.getElementById('historyOverlay').style.display = 'flex';
}

window.addEventListener('scroll', () => {
    const btn = document.getElementById('scrollTopBtn');
    if (window.scrollY > 200) btn.style.display = 'flex';
    else btn.style.display = 'none';
});

document.addEventListener('DOMContentLoaded', () => { 
    updateUI(); 
    window.checkSyncIntegrity();
    refreshSyncLine(localStorage.getItem('storedSyncTime'), false);
    startLiveSignal();
});

window.addEventListener('load', () => {
    let checkCount = 0;
    let initialCheck = setInterval(() => {
        checkCount++;
        if (window.currentSignal !== 'red') {
            clearInterval(initialCheck);
            if (localStorage.getItem('sync_blocked') === 'true' && navigator.onLine) {
                const backupBtn = document.getElementById('backupBtn');
                if (backupBtn) backupBtn.click();
            }
        } else if (checkCount > 10) {
            clearInterval(initialCheck);
        }
    }, 1000);
});
</script>
